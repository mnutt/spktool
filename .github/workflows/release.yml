name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, for example v0.1.0-test1
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
          - goos: windows
            goarch: arm64
            archive_ext: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          set -euo pipefail

          dist_dir="dist/${GOOS}-${GOARCH}"
          mkdir -p "${dist_dir}"

          bin_name="spktool"
          if [ "${GOOS}" = "windows" ]; then
            bin_name="${bin_name}.exe"
          fi

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags="-s -w" -o "${dist_dir}/${bin_name}" ./cmd/spktool
          cp README.md "${dist_dir}/README.md"

          archive_name="spktool_${VERSION}_${GOOS}_${GOARCH}.${ARCHIVE_EXT}"
          if [ "${ARCHIVE_EXT}" = "zip" ]; then
            (
              cd "${dist_dir}"
              zip -9 "../${archive_name}" "${bin_name}" README.md
            )
          else
            tar -C "${dist_dir}" -czf "dist/${archive_name}" "${bin_name}" README.md
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/spktool_${{ inputs.version || github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
